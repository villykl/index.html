<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Моя книга</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  font-family: Georgia, serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.scene {
  perspective: 1200px;
}

.book {
  width: 320px;
  height: 420px;
  position: relative;
  transform-style: preserve-3d;
  cursor: pointer;
}

.cover {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #111;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  box-shadow: 0 0 40px rgba(255,255,255,0.15);
  transform-origin: left;
  transition: transform 1s;
}

.page {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #1a1a1a;
  border-radius: 10px;
  padding: 30px;
  box-sizing: border-box;
  opacity: 0;
  transition: opacity 1s;
}

.book.open .cover {
  transform: rotateY(-160deg);
}

.book.open .page {
  opacity: 1;
}

h1 {
  margin-bottom: 10px;
}

.quote {
  font-style: italic;
  color: #aaa;
  margin-bottom: 20px;
}

.menu a {
  display: block;
  color: white;
  text-decoration: none;
  margin: 8px 0;
}

.menu a:hover {
  color: #9b7cff;
}
</style>
</head>

<body>

<div class="scene">
  <div class="book" onclick="openBook(this)">
    
    <div class="cover">
      <h1>Моя книга</h1>
      <div class="quote">"Слова — это следы души"</div>
      <small>Нажми, чтобы открыть</small>
    </div>

    <div class="page">
      <h2>Разделы</h2>
      <div class="menu">
        <a href="#">Стихи</a>
        <a href="#">Рассказы</a>
        <a href="#">Кроссворды</a>
      </div>
    </div>

  </div>
</div>

<script>
function openBook(book) {
  book.classList.toggle("open");
}
</script>

</body>
</html>
