<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Моя книга</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  font-family: Georgia, serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.book {
  width: 600px;
  height: 400px;
  position: relative;
  perspective: 1500px;
}

.page {
  width: 50%;
  height: 100%;
  background: #1a1a1a;
  position: absolute;
  top: 0;
  left: 50%;
  transform-origin: left;
  transition: transform 1s;
  padding: 20px;
  box-sizing: border-box;
}

.page:nth-child(1) { z-index: 3; }
.page:nth-child(2) { z-index: 2; }
.page:nth-child(3) { z-index: 1; }

.flipped {
  transform: rotateY(-180deg);
}

button {
  position: absolute;
  bottom: -60px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px;
  background: #222;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="book">

  <div class="page" id="p1">
    <h2>Моя книга</h2>
    <p>"Слова — это следы души"</p>
  </div>

  <div class="page" id="p2">
    <h2>Стихи</h2>
    <p>
    Тишина говорит со мной,<br>
    Словно ветер в пустом окне...
    </p>
  </div>

  <div class="page" id="p3">
    <h2>Продолжение</h2>
    <p>Здесь будет больше твоих стихов...</p>
  </div>

  <button onclick="nextPage()">Листать →</button>

</div>

<script>
let current = 1;

function nextPage() {
  if (current <= 3) {
    document.getElementById("p" + current).classList.add("flipped");
    current++;
  }
}
</script>

</body>
</html>
